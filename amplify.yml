version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "AWS_REGION=$AWS_REGION" >> .env.production
        - echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> .env.production
        - echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> .env.production
        - echo "DYNAMODB_TABLE=$DYNAMODB_TABLE" >> .env.production
        - echo "S3_BUCKET=$S3_BUCKET" >> .env.production
        - echo "SQUARE_ACCESS_TOKEN=$SQUARE_ACCESS_TOKEN" >> .env.production
        - echo "SQUARE_LOCATION_ID=$SQUARE_LOCATION_ID" >> .env.production
        - echo "SQUARE_APP_ID=$SQUARE_APP_ID" >> .env.production
        - echo "SQUARE_WEBHOOK_SIGNATURE_KEY=$SQUARE_WEBHOOK_SIGNATURE_KEY" >> .env.production
        - echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
